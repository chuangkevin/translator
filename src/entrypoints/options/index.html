<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>Translator 設定</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f9; color: #333; }
    .container { max-width: 560px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 28px; color: #1a1a1a; }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #333; }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #555; }
    input[type="text"], input[type="url"], select {
      width: 100%; padding: 9px 12px; border: 1px solid #d0d0d0;
      border-radius: 6px; font-size: 14px; outline: none; background: #fff;
      appearance: auto;
    }
    input:focus, select:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.15); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    button {
      padding: 10px 24px; background: #1a73e8; color: #fff; border: none;
      border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer;
    }
    button:hover { background: #1558b0; }
    button.secondary {
      background: #fff; color: #1a73e8; border: 1px solid #1a73e8;
      padding: 9px 14px; font-size: 13px;
    }
    button.secondary:hover { background: #e8f0fe; }
    button.icon-btn {
      background: none; border: none; color: #666; padding: 4px 8px;
      font-size: 16px; cursor: pointer; border-radius: 4px;
      line-height: 1;
    }
    button.icon-btn:hover { background: #eee; color: #333; }
    button.icon-btn.danger:hover { background: #fdecea; color: #c62828; }
    #status { margin-top: 12px; font-size: 13px; color: #2e7d32; min-height: 20px; }
    #fetch-status { font-size: 12px; color: #888; margin-top: 4px; min-height: 16px; }
    .server-section { margin-bottom: 24px; }
    .server-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .server-entry { display: grid; grid-template-columns: 1fr auto; gap: 6px; align-items: center; }
    .server-entry-controls { display: flex; gap: 2px; align-items: center; }
    .add-server-row { display: flex; gap: 8px; align-items: center; }
    .load-row { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Translator 設定</h1>

    <div class="server-section">
      <h2>OpenCode Server（依序備援）</h2>
      <div class="server-list" id="server-list"></div>
      <div class="add-server-row">
        <button class="secondary" id="add-server">＋ 新增 Server</button>
      </div>
      <div class="load-row" style="margin-top:10px;">
        <button class="secondary" id="fetch-models">載入 Models（從第一個 Server）</button>
        <span id="fetch-status"></span>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="provider">Provider</label>
        <select id="provider"><option value="">— 請先載入 Models —</option></select>
      </div>
      <div class="field">
        <label for="model">Model</label>
        <select id="model"><option value="">— 請先載入 Models —</option></select>
      </div>
    </div>
    <div class="field">
      <label for="targetLang">目標語言</label>
      <input type="text" id="targetLang" placeholder="繁體中文" />
    </div>
    <button id="save">儲存</button>
    <div id="status"></div>
  </div>
  <script type="module" src="main.ts"></script>
</body>
</html>
